    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }

<style>
    html, body { background: transparent !important; }
    .wrap { background: transparent !important; padding: 0 !important; }
    .opt { background: transparent !important; box-shadow: none !important; padding: 0 !important; }
    .banner { background: transparent !important; }
    .sky { opacity: 0 !important; }
    .opthead, .foot { display: none !important; }
    @keyframes cloudDrift { from { transform: translateX(0); } to { transform: translateX(1600px); } }
    .cloud-layer { animation: cloudDrift 70s linear infinite; will-change: transform; }
    .cloud-layer .cloud-blob { fill: #ffffff; opacity: 0.72; }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function(){
      document.querySelectorAll('.wrap').forEach(function(el){ el.classList.add('bare'); });
    });

    // Inject drifting clouds into the skyline banner once it renders.
    (function(){
      var SVGNS = 'http://www.w3.org/2000/svg';
      function makeCloud(cx, cy, s){
        var g = document.createElementNS(SVGNS, 'g');
        // a soft cloud built from overlapping circles
        var parts = [
          [0, 0, 34], [30, 6, 26], [-30, 8, 24], [14, -14, 24], [-12, -10, 22], [56, 12, 18], [-54, 14, 16]
        ];
        parts.forEach(function(p){
          var c = document.createElementNS(SVGNS, 'circle');
          c.setAttribute('cx', cx + p[0] * s);
          c.setAttribute('cy', cy + p[1] * s);
          c.setAttribute('r', p[2] * s);
          // fill + opacity set as attributes so they survive any stylesheet stripping
          c.setAttribute('fill', '#ffffff');
          c.setAttribute('opacity', '0.72');
          g.appendChild(c);
        });
        return g;
      }
      function buildLayer(){
        var layer = document.createElementNS(SVGNS, 'g');
        layer.setAttribute('class', 'cloud-layer');
        // clouds defined across one 1600-wide tile, plus a duplicate tile shifted -1600 for seamless loop
        var clouds = [
          [230, 110, 1.0], [620, 78, 0.8], [1050, 130, 1.15], [1420, 90, 0.75], [820, 170, 0.6]
        ];
        [-1600, 0].forEach(function(offset){
          clouds.forEach(function(cd){
            layer.appendChild(makeCloud(cd[0] + offset, cd[1], cd[2]));
          });
        });
        // self-contained SMIL drift so it works without any CSS
        var anim = document.createElementNS(SVGNS, 'animateTransform');
        anim.setAttribute('attributeName', 'transform');
        anim.setAttribute('type', 'translate');
        anim.setAttribute('from', '0 0');
        anim.setAttribute('to', '1600 0');
        anim.setAttribute('dur', '70s');
        anim.setAttribute('repeatCount', 'indefinite');
        layer.appendChild(anim);
        return layer;
      }
      function tryInject(){
        var banners = document.querySelectorAll('.banner');
        if (!banners.length) return false;
        var done = false;
        banners.forEach(function(banner){
          if (banner.querySelector('.cloud-layer')) { done = true; return; }
          var sky = banner.querySelector('.sky');
          var layer = buildLayer();
          // insert just after the sky so clouds sit behind the buildings
          if (sky && sky.nextSibling) banner.insertBefore(layer, sky.nextSibling);
          else banner.insertBefore(layer, banner.firstChild);
          done = true;
        });
        return done;
      }
      var tries = 0;
      var iv = setInterval(function(){
        tries++;
        if (tryInject() || tries > 60) clearInterval(iv);
      }, 100);
      document.addEventListener('DOMContentLoaded', tryInject);
    })();
  </script>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

92\" cy=\"132\" r=\"11\" fill=\"#1c1c1e\"><\u002Fcircle><text x=\"114\" y=\"141\" class=\"coName\">RIO<\u002Ftext><line x1=\"177\" y1=\"120\" x2=\"177\" y2=\"144\" stroke=\"#dcdce1\" stroke-width=\"2\"><\u002Fline><text x=\"193\" y=\"140\" class=\"coData\">Autonomous Haulage<\u002Ftext><path class=\"arrUp\" d=\"M386,119 L393,128 L388,128 L388,145 L384,145 L384,128 L379,128 Z\" fill=\"#1f9d57\"><\u002Fpath><text x=\"399\" y=\"139\" class=\"coPct\">+4.8%<\u002Ftext><\u002Fg><g class=\"callout\" style=\"animation-delay:2.1s\"><line x1=\"800\" y1=\"78\" x2=\"800\" y2=\"92\" stroke=\"#b0b0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-dasharray=\"0.1,7\"><\u002Fline><circle cx=\"800\" cy=\"92\" r=\"4\" fill=\"#b0b0b8\"><\u002Fcircle><rect x=\"642\" y=\"14\" width=\"324\" height=\"64\" rx=\"32\" fill=\"#fff\" filter=\"url(#pill)\"><\u002Frect><circle cx=\"690\" cy=\"46\" r=\"11\" fill=\"#1c1c1e\"><\u002Fcircle><text x=\"712\" y=\"55\" class=\"coName\">BHP<\u002Ftext><line x1=\"784\" y1=\"34\" x2=\"784\" y2=\"58\" stroke=\"#dcdce1\" stroke-width=\"2\"><\u002Fline><text x=\"800\" y=\"54\" class=\"coData\">Finance &amp; Accounting<\u002Ftext><path class=\"arrUp\" d=\"M984,33 L991,42 L986,42 L986,59 L982,59 L982,42 L977,42 Z\" fill=\"#1f9d57\"><\u002Fpath><text x=\"997\" y=\"53\" class=\"coPct\">+3.1%<\u002Ftext><\u002Fg><g class=\"callout\" style=\"animation-delay:2.25s\"><line x1=\"1300\" y1=\"200\" x2=\"1300\" y2=\"214\" stroke=\"#b0b0b8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-dasharray=\"0.1,7\"><\u002Fline><circle cx=\"1300\" cy=\"214\" r=\"4\" fill=\"#b0b0b8\"><\u002Fcircle><rect x=\"1142\" y=\"136\" width=\"324\" height=\"64\" rx=\"32\" fill=\"#fff\" filter=\"url(#pill)\"><\u002Frect><circle cx=\"1190\" cy=\"168\" r=\"11\" fill=\"#1c1c1e\"><\u002Fcircle><text x=\"1212\" y=\"177\" class=\"coName\">FMG<\u002Ftext><line x1=\"1288\" y1=\"156\" x2=\"1288\" y2=\"180\" stroke=\"#dcdce1\" stroke-width=\"2\"><\u002Fline><text x=\"1304\" y=\"176\" class=\"coData\">Electrical Trade<\u002Ftext><path class=\"arrDn\" d=\"M1484,181 L1491,172 L1486,172 L1486,155 L1482,155 L1482,172 L1477,172 Z\" fill=\"#db4a3d\"><\u002Fpath><text x=\"1497\" y=\"176\" class=\"coPct dn\">-2.6%<\u002Ftext><\u002Fg><\u002Fsvg><p class=\"foot\">Every tower is an isometric prism whose three faces reuse the logo's exact greys — light top (#8e8e93), mid side (#48484a), dark front (#1c1c1e) — so the skyline is literally built from the employsi mark. A slim accent spire marks the tallest tower. Blocks pop up in a staggered wave.<\u002Fp><\u002Fsection><\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1720,&quot;height&quot;:720},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#6d8cad&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Style&quot;},&quot;mood&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;day&quot;,&quot;options&quot;:[&quot;day&quot;,&quot;dusk&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Style&quot;},&quot;showClouds&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Style&quot;},&quot;transparent&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Style&quot;}}\">\nclass Component extends DCLogic{\n  renderVals(){\n    const W=1600, waterTop=470;\n    const G={xl:'#d6d5db',l:'#c4c3ca',ml:'#adacb3',m:'#8e8e93',md:'#6f6f75',d:'#4b4b4e',dd:'#2c2c2f'};\n    const dOf=x=>+(0.14+(x/W)*0.72).toFixed(2);\n    const mk=(x,w,h,f,win)=>({x,w,h,f,win:!!win,y:waterTop-h,hh:h+30,d:dOf(x)});\n    const cityB=[\n      mk(122,72,150,G.l), mk(206,56,208,G.xl), mk(1150,72,190,G.l),\n      mk(1246,60,250,G.xl), mk(1360,84,166,G.l), mk(1456,66,214,G.xl),\n      mk(300,94,246,G.ml), mk(406,66,296,G.m), mk(760,80,272,G.m,true),\n      mk(858,66,330,G.ml), mk(1034,92,296,G.m,true),\n      mk(505,116,440,G.md,true), mk(648,58,226,G.d), mk(950,74,360,G.d,true)\n    ];\n    // isometric city\n    const isoBox=(cx,baseY,w,d,h,i)=>{\n      const ax=w*0.5, ay=w*0.28, bx=d*0.5, by=d*0.28;\n      const N=[cx,baseY], L=[cx-ax,baseY-ay], R=[cx+bx,baseY-by], F=[cx-ax+bx,baseY-ay-by];\n      const up=p=>[p[0],p[1]-h];\n      const Np=up(N),Lp=up(L),Rp=up(R),Fp=up(F);\n      const s=a=>a.map(p=>p.join(',')).join(' ');\n      // windows on the right (mid-grey) face\n      const face=(u,v)=>[+(cx+u*bx).toFixed(2),+(baseY-u*by-v).toFixed(2)];\n      const wins=[]; const cols=3, uPad=0.14, uGap=0.07;\n      const cellU=(1-2*uPad-(cols-1)*uGap)/cols;\n      const rowH=9, rowGap=8, vPad=14;\n      const tones=['#6a6a72','#5a5a61','#7b7b83','#525258'];\n      let k=0;\n      for(let v=vPad; v+rowH<=h-9; v+=rowH+rowGap){\n        for(let c=0;c<cols;c++){\n          const u0=uPad+c*(cellU+uGap), u1=u0+cellU;\n          wins.push({p:s([face(u0,v),face(u1,v),face(u1,v+rowH),face(u0,v+rowH)]),f:tones[(k*7+ (v|0))%tones.length]});\n          k++;\n        }\n      }\n      return {\n        left:s([N,L,Lp,Np]), right:s([N,R,Rp,Np]), top:s([Np,Lp,Fp,Rp]), wins,\n        fl:'#1c1c1e', fr:'#48484a', ft:'#8e8e93',\n        d:+(0.08+(cx/W)*0.5+ (i%3)*0.02).toFixed(2)\n      };\n    };\n    const iso=[\n      isoBox(300,470,86,86,150,0), isoBox(430,462,78,78,240,1), isoBox(560,470,90,90,120,2),\n      isoBox(690,458,84,84,300,3), isoBox(800,450,104,104,300,4), isoBox(930,470,80,80,190,5),\n      isoBox(1050,462,86,86,250,6), isoBox(1180,470,80,80,150,7), isoBox(1300,466,74,74,210,8),\n      isoBox(220,466,70,70,120,9), isoBox(1410,470,72,72,110,10)\n    ];\n    // isometric street-map floor (fades at edges via mask)\n    const FX=s=>800+30*s, FY=t=>470-16*t;\n    const tLo=-2.2, tHi=3.2, sLo=-27, sHi=27;\n    const minorLines=[], majorLines=[];\n    const seg=(x1,y1,x2,y2,major)=>(major?majorLines:minorLines).push({x1:+x1.toFixed(1),y1:+y1.toFixed(1),x2:+x2.toFixed(1),y2:+y2.toFixed(1)});\n    for(let a=-15;a<=15;a++){\n      let t1=Math.max(tLo,2*a-sHi), t2=Math.min(tHi,2*a-sLo);\n      if(t2>t1) seg(FX(2*a-t1),FY(t1),FX(2*a-t2),FY(t2), a%4===0);\n    }\n    for(let a=-15;a<=15;a++){\n      let t1=Math.max(tLo,sLo+2*a), t2=Math.min(tHi,sHi+2*a);\n      if(t2>t1) seg(FX(t1-2*a),FY(t1),FX(t2-2*a),FY(t2), a%4===0);\n    }\n    // winding river across the map\n    const top=[], bot=[];\n    for(let s=-29;s<=29;s+=1.5){\n      const tc=-1.2+0.8*Math.sin((s+7)*0.11);\n      top.push([FX(s),FY(tc+0.98)]); bot.push([FX(s),FY(tc-0.98)]);\n    }\n    const rp=top.concat(bot.reverse());\n    const riverPath='M'+rp.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L')+' Z';\n    const cen=[];\n    for(let s=-29;s<=29;s+=1.5){ const tc=-1.2+0.8*Math.sin((s+7)*0.11); cen.push([FX(s),FY(tc)]); }\n    const riverCenter='M'+cen.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');\n    // flat bands\n    const band=(arr,base,dbase)=>arr.map((v,i)=>({x:v[0],w:v[1],y:base-v[2],hh:v[2]+30,d:+(dbase+(v[0]/W)*0.4).toFixed(2)}));\n    const bandBack=band([[90,120,190],[240,90,240],[430,110,200],[640,100,260],[880,120,210],[1080,100,250],[1300,120,220],[1470,90,180]],430,0.02);\n    const bandMid=band([[150,110,250],[320,80,270],[520,120,300],[720,90,280],[900,110,320],[1120,100,290],[1330,110,260],[1500,90,230]],450,0.14);\n    const bandFront=band([[80,120,300],[280,100,360],[500,130,330],[700,60,260],[900,120,380],[1150,110,340],[1380,120,300]],470,0.28);\n\n    const replay=(e)=>{\n      const opt=e.currentTarget.closest('.opt');\n      opt.querySelectorAll('.rise,.callout,.floor').forEach(el=>{\n        el.style.animationName='none';\n        void el.getBoundingClientRect();\n        el.style.animationName='';\n      });\n      opt.querySelectorAll('.cloud,.cloudlayer').forEach(el=>{\n        const n=el.style.animationName; el.style.animation='none';\n        void el.getBoundingClientRect(); el.style.animation='';\n      });\n    };\n    return {cityB, iso, bandBack, bandMid, bandFront, minorLines, majorLines, riverPath, riverCenter, replay, showClouds:this.props.showClouds ?? true};\n  }\n  applyStyle(){\n    const w=document.querySelectorAll('.wrap');\n    const acc=this.props.accent || '#6d8cad';\n    const dusk=this.props.mood==='dusk';\n    w.forEach(el=>{ el.style.setProperty('--accent',acc); el.classList.toggle('dusk',dusk); el.classList.toggle('bare', !!this.props.transparent); });\n  }\n  componentDidMount(){ this.applyStyle(); }\n  componentDidUpdate(){ this.applyStyle(); }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
