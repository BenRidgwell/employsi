# Daily Zhaopin (智联招聘) → D1 archive (hosted, via the Oxylabs Web Scraper API).
#
# Zhaopin's anti-bot blocks datacenter IPs and needs JS + a China exit. This
# fetches each company's rendered search page through the Oxylabs Web Scraper
# API (geo China + JS render + anti-bot bypass) and parses the embedded
# __INITIAL_STATE__ job records — no Playwright, runs on an ordinary GitHub
# runner. Verified end-to-end.
#
# Required repo secrets:
#   OXYLABS_USERNAME, OXYLABS_PASSWORD  — Oxylabs Web Scraper API credentials
#   CLOUDFLARE_API_TOKEN                — D1 edit on the employsi account
# Optional repo variables: CF_ACCOUNT_ID, D1_DATABASE_ID
#
# Exits non-zero (red X) if Zhaopin returns nothing. Use "Run workflow" to verify
# before relying on the schedule.

name: zhaopin-archive

on:
  schedule:
    - cron: '30 20 * * *' # 20:30 UTC daily — staggered after Indeed
  workflow_dispatch: {}

concurrency:
  group: zhaopin-archive
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Scrape Zhaopin → D1 (Oxylabs)
        env:
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
        # All ~94 roster companies; up to 8 pages each (early-stop on no new ads).
        run: python scripts/zhaopin-to-d1.py --max-pages 8 --concurrency 8
