# Daily LinkedIn → D1 archive (hosted, via the Oxylabs Web Scraper API).
#
# LinkedIn blocks datacenter IPs (429 / auth-wall), so instead of a browser this
# fetches LinkedIn's guest jobs-search HTML through the Oxylabs Web Scraper API
# (which supplies the residential IP + rendering) and parses the returned job
# cards — no Playwright, so it runs on an ordinary GitHub runner. Every role is
# skill-mapped and deduped against the other sources (Adzuna/SEEK/Indeed/gov)
# before archival, and re-seen roles refresh their last_seen for history.
#
# Required repo secrets:
#   OXYLABS_USERNAME, OXYLABS_PASSWORD  — Oxylabs Web Scraper API credentials
#   CLOUDFLARE_API_TOKEN                — D1 edit on the employsi account
# Optional repo variables: CF_ACCOUNT_ID, D1_DATABASE_ID
#
# Exits non-zero (red X) if LinkedIn starts returning nothing. Use "Run workflow"
# to verify before relying on the schedule.

name: linkedin-archive

on:
  schedule:
    - cron: '30 21 * * *' # 21:30 UTC daily (after the Indeed run at 20:00)
  workflow_dispatch: {}

concurrency:
  group: linkedin-archive
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Scrape LinkedIn → D1 (Oxylabs)
        env:
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
        # All ~205 roster companies; up to 10 guest-API pages (25 cards) each —
        # the driver stops early once a company yields no new ads.
        run: python scripts/linkedin-to-d1.py --location Australia --max-pages 10 --concurrency 8
